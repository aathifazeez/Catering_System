<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Explore CaterPro's elegant menu catering options." />
  <title>Our Catering Menu — CaterPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="public-body">

  <!-- ── PUBLIC HEADER ── -->
  <header class="public-header">
    <a href="index.html" class="public-brand">
      <span class="public-brand-icon">✦</span>
      <span class="public-brand-name">CaterPro</span>
    </a>
    <nav class="public-nav">
      <a href="index.html" class="public-nav-link">Home</a>
      <a href="menu.html" class="public-nav-link active">Our Menu</a>
      <a href="book.html" class="public-nav-link">Book Catering</a>
      <span id="header-auth" style="display:flex; align-items:center;">
        <!-- Filled dynamically by shared.js -->
      </span>
    </nav>
  </header>

  <!-- ── MENU CONTENT ── -->
  <main class="main">
    <section class="public-section">
      <div class="section-header">
        <div class="section-tag">Gourmet Offerings</div>
        <h1 class="section-title">Our Catering Menu</h1>
      </div>

      <div class="page-actions" style="margin-bottom: 30px;">
        <div class="filter-tabs" id="menuFilters">
          <button class="filter-tab active" data-cat="All">All</button>
          <button class="filter-tab" data-cat="Appetizer">Appetizers</button>
          <button class="filter-tab" data-cat="Main Course">Main Courses</button>
          <button class="filter-tab" data-cat="Dessert">Desserts</button>
          <button class="filter-tab" data-cat="Beverage">Beverages</button>
          <button class="filter-tab" data-cat="Side Dish">Side Dishes</button>
        </div>
        <input class="search-input" type="text" placeholder="Search menu items..." id="menuSearchInput" />
      </div>

      <div class="menu-grid" id="publicMenuGrid">
        <div class="loading" style="grid-column: 1/-1; padding: 60px;">Loading exquisite delicacies…</div>
      </div>
    </section>
  </main>

  <!-- ── PUBLIC FOOTER ── -->
  <footer class="public-footer">
    <div class="footer-logo">CaterPro</div>
    <div class="footer-links">
      <a href="index.html" class="public-nav-link">Home</a>
      <a href="menu.html" class="public-nav-link">Our Menu</a>
      <a href="book.html" class="public-nav-link">Book Catering</a>
    </div>
    <div class="footer-copy">&copy; 2026 CaterPro American Food Co. All Rights Reserved.</div>
  </footer>

  <div class="toast" id="toast"></div>

  <!-- Scripts -->
  <script src="js/shared.js"></script>
  <script src="js/menu.js"></script>
</body>
</html>
